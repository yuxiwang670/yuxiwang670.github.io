<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Research overview: active belief control for autonomous AI agents</title>
  <desc id="desc">A technical research overview linking human cognition and neuroscience to autonomous AI agents through an active belief control loop.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1f2937" flood-opacity="0.15"/>
    </filter>
    <marker id="arrow-teal" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <marker id="arrow-indigo" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#4338ca"/>
    </marker>
    <marker id="arrow-slate" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <linearGradient id="aiGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="52%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="softPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f5"/>
    </linearGradient>
    <style>
      .bg { fill: #f7f8fb; }
      .title { font: 700 34px Arial, Helvetica, sans-serif; fill: #111827; }
      .subtitle { font: 400 17px Arial, Helvetica, sans-serif; fill: #475569; }
      .section { font: 700 18px Arial, Helvetica, sans-serif; fill: #111827; }
      .small { font: 400 14px Arial, Helvetica, sans-serif; fill: #475569; }
      .label { font: 700 14px Arial, Helvetica, sans-serif; fill: #1f2937; }
      .white { fill: #ffffff; }
      .white-text { fill: #ffffff; }
      .tiny { font: 400 12px Arial, Helvetica, sans-serif; fill: #64748b; }
      .tag { font: 700 12px Arial, Helvetica, sans-serif; fill: #334155; }
      .caps { font: 700 12px Arial, Helvetica, sans-serif; fill: #475569; }
      .box { fill: #ffffff; stroke: #dbe4ee; stroke-width: 1.5; rx: 8; filter: url(#shadow); }
      .mini { fill: #ffffff; stroke: #d7dee8; stroke-width: 1.2; rx: 8; }
      .accent-teal { fill: #0f766e; }
      .accent-coral { fill: #e11d48; }
      .accent-amber { fill: #d97706; }
      .accent-indigo { fill: #4338ca; }
      .accent-sky { fill: #0369a1; }
      .line-teal { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); }
      .line-indigo { stroke: #4338ca; stroke-width: 3; fill: none; marker-end: url(#arrow-indigo); }
      .line-slate { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow-slate); }
      .loop { stroke: #0f766e; stroke-width: 3; fill: none; marker-end: url(#arrow-teal); stroke-linecap: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="760"/>
  <path d="M0,0 H1200 V120 C1010,95 910,135 760,104 C560,62 410,92 230,122 C125,140 62,118 0,104 Z" fill="#eef6f5"/>
  <path d="M1200,760 H0 V635 C150,680 285,618 430,653 C650,706 760,622 940,650 C1050,666 1134,707 1200,682 Z" fill="#f1f5f9"/>

  <text class="title" x="60" y="66">Research Overview</text>
  <text class="subtitle" x="60" y="96">From human cognition and neuroscience to active belief control in autonomous AI agents</text>
  <rect x="930" y="48" width="210" height="42" rx="8" fill="#111827"/>
  <text class="caps white-text" x="952" y="74">Future Core: AI Agents</text>

  <rect class="box" x="55" y="150" width="275" height="380"/>
  <rect x="55" y="150" width="275" height="58" rx="8" fill="#ffffff"/>
  <rect x="55" y="150" width="10" height="380" fill="#e11d48"/>
  <text class="section" x="84" y="185">Human Cognition</text>
  <text class="small" x="84" y="207">&amp; Neuroscience</text>

  <g transform="translate(86 245)">
    <circle cx="11" cy="11" r="11" class="accent-coral"/>
    <text class="label" x="34" y="16">Belief formation</text>
    <text class="tiny" x="34" y="36">concepts, rules, task structure</text>
  </g>
  <g transform="translate(86 315)">
    <circle cx="11" cy="11" r="11" class="accent-amber"/>
    <text class="label" x="34" y="16">Reward &amp; social processing</text>
    <text class="tiny" x="34" y="36">depression, anxiety, autism, interaction</text>
  </g>
  <g transform="translate(86 385)">
    <circle cx="11" cy="11" r="11" class="accent-indigo"/>
    <text class="label" x="34" y="16">Metacognitive control</text>
    <text class="tiny" x="34" y="36">confidence, uncertainty, self-monitoring</text>
  </g>
  <rect x="86" y="470" width="212" height="34" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
  <text class="tag" x="105" y="492">Mechanistic inspiration</text>

  <rect class="box" x="394" y="135" width="412" height="430"/>
  <rect x="394" y="135" width="412" height="64" rx="8" fill="url(#softPanel)"/>
  <text class="section" x="430" y="171">Active Belief Control Loop</text>
  <text class="small" x="430" y="193">a testable, interpretable, trainable cognitive control architecture</text>

  <circle cx="600" cy="375" r="102" fill="#ecfdf5" stroke="#99f6e4" stroke-width="2"/>
  <circle cx="600" cy="375" r="64" fill="url(#aiGradient)" opacity="0.96"/>
  <text class="white-text" x="556" y="363" style="font:700 17px Arial, Helvetica, sans-serif;">Belief</text>
  <text class="white-text" x="535" y="386" style="font:700 17px Arial, Helvetica, sans-serif;">Control Engine</text>
  <text class="white-text" x="548" y="410" style="font:400 12px Arial, Helvetica, sans-serif;">under uncertainty</text>

  <rect class="mini" x="430" y="245" width="145" height="54"/>
  <text class="label" x="450" y="267">Belief</text>
  <text class="tiny" x="450" y="286">formation</text>

  <rect class="mini" x="626" y="245" width="145" height="54"/>
  <text class="label" x="646" y="267">Uncertainty</text>
  <text class="tiny" x="646" y="286">estimation</text>

  <rect class="mini" x="672" y="351" width="112" height="54"/>
  <text class="label" x="692" y="373">Monitor</text>
  <text class="tiny" x="692" y="392">reliability</text>

  <rect class="mini" x="626" y="455" width="145" height="54"/>
  <text class="label" x="646" y="477">Seek</text>
  <text class="tiny" x="646" y="496">information</text>

  <rect class="mini" x="430" y="455" width="145" height="54"/>
  <text class="label" x="450" y="477">Revise</text>
  <text class="tiny" x="450" y="496">hypotheses</text>

  <rect class="mini" x="416" y="351" width="112" height="54"/>
  <text class="label" x="437" y="373">Gate</text>
  <text class="tiny" x="437" y="392">safe action</text>

  <path class="loop" d="M574,271 C615,242 656,245 691,297"/>
  <path class="loop" d="M750,300 C785,345 785,389 752,435"/>
  <path class="loop" d="M694,509 C646,543 555,544 503,510"/>
  <path class="loop" d="M451,455 C411,408 410,354 447,300"/>
  <path class="loop" d="M528,378 C548,388 558,390 573,389"/>
  <path class="loop" d="M672,378 C650,390 641,391 626,389"/>

  <rect class="box" x="870" y="120" width="275" height="455"/>
  <rect x="870" y="120" width="275" height="88" rx="8" fill="url(#aiGradient)"/>
  <rect x="870" y="120" width="10" height="455" fill="#111827" opacity="0.25"/>
  <text class="section white-text" x="904" y="158">Autonomous AI Agents</text>
  <text class="small white-text" x="904" y="184">the next research direction</text>

  <g transform="translate(904 242)">
    <rect x="0" y="0" width="205" height="46" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text class="label" x="18" y="20">Unknown rules</text>
    <text class="tiny" x="18" y="37">infer hidden task structure</text>
  </g>
  <g transform="translate(904 309)">
    <rect x="0" y="0" width="205" height="46" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text class="label" x="18" y="20">Ask / explore / feedback</text>
    <text class="tiny" x="18" y="37">active information seeking</text>
  </g>
  <g transform="translate(904 376)">
    <rect x="0" y="0" width="205" height="46" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text class="label" x="18" y="20">Self-monitoring</text>
    <text class="tiny" x="18" y="37">knows when it does not know</text>
  </g>
  <g transform="translate(904 443)">
    <rect x="0" y="0" width="205" height="46" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text class="label" x="18" y="20">Safe action gating</text>
    <text class="tiny" x="18" y="37">act, defer, clarify, or refuse</text>
  </g>
  <rect x="904" y="520" width="205" height="32" rx="8" fill="#111827"/>
  <text class="tag white-text" x="930" y="541">Cognitive safety for AGI</text>

  <path class="line-slate" d="M330,340 C360,340 363,340 392,340"/>
  <path class="line-indigo" d="M806,340 C835,340 842,340 868,340"/>

  <rect x="94" y="590" width="1012" height="94" rx="8" fill="#ffffff" stroke="#dbe4ee" stroke-width="1.4" filter="url(#shadow)"/>
  <text class="section" x="125" y="625">Benchmark environments</text>
  <text class="small" x="125" y="650">Different tasks, one mechanism: testing how agents form, monitor, revise, and act on beliefs.</text>

  <g transform="translate(418 611)">
    <rect x="0" y="0" width="126" height="42" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
    <text class="tag" x="18" y="25">Metacognition</text>
  </g>
  <g transform="translate(558 611)">
    <rect x="0" y="0" width="138" height="42" rx="8" fill="#ecfeff" stroke="#a5f3fc"/>
    <text class="tag" x="18" y="25">Autonomous learning</text>
  </g>
  <g transform="translate(710 611)">
    <rect x="0" y="0" width="132" height="42" rx="8" fill="#fff7ed" stroke="#fed7aa"/>
    <text class="tag" x="18" y="25">Unknown rules</text>
  </g>
  <g transform="translate(856 611)">
    <rect x="0" y="0" width="98" height="42" rx="8" fill="#fff1f2" stroke="#fecdd3"/>
    <text class="tag" x="18" y="25">Trust</text>
  </g>
  <g transform="translate(968 611)">
    <rect x="0" y="0" width="108" height="42" rx="8" fill="#f0fdf4" stroke="#bbf7d0"/>
    <text class="tag" x="18" y="25">Safety</text>
  </g>
</svg>
